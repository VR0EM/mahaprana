<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="./support.js"></script>
</head>

<body>
  <x-dc>
    <helmet>
      <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Karla:wght@400;500;600;700&display=swap"
        rel="stylesheet">
      <style>
        body {
          margin: 0;
          background: #F7F3EA;
        }
        @keyframes menuIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
        @keyframes menuItemIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
        @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; transition: none !important; } }
      </style>
    </helmet>
    <header
      style="position: sticky; top: 0; z-index: 50; background: rgba(247,243,234,0.96); border-bottom: 1px solid #E3DBC9">
      <div
        style="max-width: 1180px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; gap: 24px; height: 76px">
        <a href="index.html"
          style="font-family: 'Lora', Georgia, serif; font-size: 23px; font-weight: 500; letter-spacing: 0.2em; color: #33302A; text-decoration: none; white-space: nowrap">MAHA
          PRANA</a>
        <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
          <nav aria-label="Hoofdnavigatie" style="display: flex; align-items: center; gap: 26px">
            <a data-nav="home" href="index.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Home</a>
            <a data-nav="massages" href="massages.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Massages</a>
            <a data-nav="gelaat" href="gelaatsrituelen.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Gelaatsrituelen</a>
            <a data-nav="energetisch" href="energetisch-werk.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Energetisch werk</a>
            <a data-nav="over" href="over-mij.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Over mij</a>
            <a data-nav="contact" href="contact.html"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent"
              style-hover="color: #B57859">Contact &amp; Boeken</a>
            <a href="https://www.studiobookr.com/nl/maha-prana-75675#/" target="_blank" rel="noopener"
              style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #F7F3EA; background: #B57859; padding: 11px 20px; border-radius: 8px; text-decoration: none"
              style-hover="background: #A96B4F">Boek nu</a>
          </nav>
        </sc-if>
        <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
          <button onClick="{{ toggle }}" data-burger aria-label="Menu openen of sluiten" aria-expanded="false"
            style="display: flex; flex-direction: column; gap: 5px; background: none; border: none; padding: 12px; cursor: pointer">
            <span style="display: block; width: 24px; height: 2px; background: #33302A; border-radius: 2px; transition: transform 0.3s ease"></span>
            <span style="display: block; width: 24px; height: 2px; background: #33302A; border-radius: 2px; transition: opacity 0.2s ease"></span>
            <span style="display: block; width: 24px; height: 2px; background: #33302A; border-radius: 2px; transition: transform 0.3s ease"></span>
          </button>
        </sc-if>
      </div>
      <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
        <nav aria-label="Mobiele navigatie"
          style="display: flex; flex-direction: column; gap: 4px; padding: 8px 24px 28px 24px; border-top: 1px solid #E3DBC9; background: #F7F3EA; box-shadow: 0 18px 24px -18px rgba(51, 48, 42, 0.35); animation: menuIn 0.25s ease both">
          <a data-nav="home" href="index.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.04s">Home</a>
          <a data-nav="massages" href="massages.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.07s">Massages</a>
          <a data-nav="gelaat" href="gelaatsrituelen.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.10s">Gelaatsrituelen</a>
          <a data-nav="energetisch" href="energetisch-werk.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.13s">Energetisch
            werk</a>
          <a data-nav="over" href="over-mij.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.16s">Over
            mij</a>
          <a data-nav="contact" href="contact.html"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 15px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #4A453C; text-decoration: none; padding: 14px 0; border-bottom: 1px solid #ECE5D4; animation: menuItemIn 0.3s ease both; animation-delay: 0.19s">Contact
            &amp; Boeken</a>
          <a href="https://www.studiobookr.com/nl/maha-prana-75675#/" target="_blank" rel="noopener"
            style="font-family: Karla, 'Helvetica Neue', Arial, sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #F7F3EA; background: #B57859; padding: 15px 20px; border-radius: 8px; text-decoration: none; text-align: center; margin-top: 18px; animation: menuItemIn 0.3s ease both; animation-delay: 0.22s">Boek
            nu</a>
        </nav>
      </sc-if>
    </header>
  </x-dc>
  <script type="text/x-dc" data-dc-script
    data-props="{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:90},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;home&quot;,&quot;massages&quot;,&quot;gelaat&quot;,&quot;energetisch&quot;,&quot;over&quot;,&quot;contact&quot;,&quot;cadeaubons&quot;,&quot;voorwaarden&quot;],&quot;default&quot;:&quot;home&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { open: false, mobile: false };
  componentDidMount() {
    this.mq = window.matchMedia('(max-width: 920px)');
    this.onMq = () => this.setState({ mobile: this.mq.matches, open: false });
    if (this.mq.addEventListener) this.mq.addEventListener('change', this.onMq);
    this.setState({ mobile: this.mq.matches });
    this.markActive();
    this.updateBurger();
  }
  componentDidUpdate() { this.markActive(); this.updateBurger(); }
  updateBurger() {
    const btn = document.querySelector('[data-burger]');
    if (!btn) return;
    const open = this.state.mobile && this.state.open;
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    const bars = btn.querySelectorAll('span');
    if (bars.length === 3) {
      bars[0].style.transform = open ? 'translateY(7px) rotate(45deg)' : 'none';
      bars[1].style.opacity = open ? '0' : '1';
      bars[2].style.transform = open ? 'translateY(-7px) rotate(-45deg)' : 'none';
    }
  }
  componentWillUnmount() {
    if (this.mq && this.mq.removeEventListener) this.mq.removeEventListener('change', this.onMq);
  }
  markActive() {
    const key = this.props.active;
    document.querySelectorAll('[data-nav]').forEach((a) => {
      const on = a.getAttribute('data-nav') === key;
      a.style.borderBottomColor = on ? '#A96B4F' : 'transparent';
      if (on) a.setAttribute('aria-current', 'page');
      else a.removeAttribute('aria-current');
    });
  }
  renderVals() {
    return {
      isDesktop: !this.state.mobile,
      isMobile: this.state.mobile,
      menuOpen: this.state.mobile && this.state.open,
      toggle: () => this.setState((s) => ({ open: !s.open })),
    };
  }
}
</script>
</body>

</html>
